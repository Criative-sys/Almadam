<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختبار المرحلة الأولى | نادي المدام</title>

  <style>
    :root {
      --burgundy: #6b0614;
      --burgundy-dark: #32030d;
      --gold: #d4a653;
      --bg: #f5f6fa;
      --text: #1f2937;
      --muted: #667085;
    }

    * {
      box-sizing: border-box;
      font-family: Tahoma, Arial, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--burgundy), var(--burgundy-dark));
      color: white;
      text-align: center;
      padding: 28px 20px;
    }

    header h1 {
      color: var(--gold);
      margin: 10px 0;
    }

    .logos {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .logos img {
      width: 75px;
      height: 75px;
      object-fit: contain;
      background: white;
      border-radius: 14px;
      padding: 7px;
    }

    .container {
      max-width: 900px;
      margin: 25px auto;
      padding: 0 18px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
      color: var(--burgundy);
      margin-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: bold;
      color: var(--burgundy);
    }

    input, textarea, select {
      width: 100%;
      padding: 14px;
      border: 1px solid #d0d5dd;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(212,166,83,0.18);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .full {
      grid-column: 1 / -1;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold), #b88732);
      color: white;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      text-align: center;
      font-weight: bold;
    }

    .success {
      display: block;
      background: #ecfdf3;
      color: #027a48;
      border: 1px solid #abefc6;
    }

    .error {
      display: block;
      background: #fef3f2;
      color: #b42318;
      border: 1px solid #fecdca;
    }

    @media(max-width: 750px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logos">
    <img src="logo1.jpeg" alt="Al Madam Club">
    <img src="SSC.png" alt="Sharjah Sports Council">
  </div>
  <h1>استمارة 1-A</h1>
  <p>بطارية الاختبارات الحركية الأساسية</p>
</header>

<div class="container">
  <div class="card">
    <h2>إدخال نتائج اختبار المرحلة الأولى</h2>

    <form id="stage1Form">
      <div class="grid">

        <div class="field">
          <label>اسم اللاعب</label>
          <input type="text" name="playerName" required>
        </div>

        <div class="field">
          <label>رقم الهوية الإماراتية</label>
          <input type="text" name="emiratesId" required placeholder="784XXXXXXXXXXXX">
        </div>

        <div class="field">
          <label>الجري 20 متر / ثانية</label>
          <input type="number" step="0.01" name="run20m" required>
        </div>

        <div class="field">
          <label>الوثب العريض من الثبات / سم</label>
          <input type="number" step="0.01" name="longJump" required>
        </div>

        <div class="field">
          <label>التوازن على قدم واحدة / ثانية</label>
          <input type="number" step="0.01" name="balance" required>
        </div>

        <div class="field">
          <label>تنسيق العين واليد / من 10</label>
          <input type="number" min="0" max="10" name="catchBall" required>
        </div>

        <div class="field">
          <label>الزحف والتسلق</label>
          <input type="text" name="crawlClimb" placeholder="مثال: 12 ثانية">
        </div>

        <div class="field">
          <label>الرشاقة 4×5 متر / ثانية</label>
          <input type="number" step="0.01" name="agility" required>
        </div>

        <div class="field">
          <label>المرونة / سم</label>
          <input type="number" step="0.01" name="flexibility" required>
        </div>

        <div class="field">
          <label>توصية المقيّم</label>
          <select name="recommendation" required>
            <option value="">اختر التوصية</option>
            <option value="مرشح للمرحلة الثانية">مرشح للمرحلة الثانية</option>
            <option value="متابعة ومراقبة">متابعة ومراقبة</option>
            <option value="إثراء حركي عام">إثراء حركي عام</option>
          </select>
        </div>

        <div class="field full">
          <label>ملاحظات ميدانية</label>
          <textarea name="notes" placeholder="اكتب ملاحظات المدرب هنا..."></textarea>
        </div>

      </div>

      <button type="submit" id="submitBtn">حفظ نتيجة الاختبار</button>
      <div id="message" class="message"></div>
    </form>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGHC0QPf2-REo1wgsdBdUfWgOQQAttw7qKB86pVSU95b2gm7dkyxL55I2mBB3fU-lQ/exec";

  const form = document.getElementById("stage1Form");
  const btn = document.getElementById("submitBtn");
  const message = document.getElementById("message");

  function showMessage(text, type) {
    message.textContent = text;
    message.className = "message " + type;
    message.style.display = "block";
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    btn.disabled = true;
    btn.textContent = "جاري الحفظ...";
    message.style.display = "none";

    const formData = new FormData(form);
    const data = new URLSearchParams();

    data.append("action", "saveStage1");

    for (const [key, value] of formData.entries()) {
      data.append(key, value);
    }

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: data
      });

      showMessage("تم حفظ نتيجة الاختبار بنجاح ✅", "success");
      form.reset();

    } catch (error) {
      showMessage("حدث خطأ أثناء الحفظ.", "error");
    }

    btn.disabled = false;
    btn.textContent = "حفظ نتيجة الاختبار";
  });
</script>

</body>
</html>
